steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/docíntel-ai:$SHORT_SHA', '.']

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/docíntel-ai:$SHORT_SHA']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - run
      - --filename=.
      - --image=gcr.io/$PROJECT_ID/docíntel-ai:$SHORT_SHA
      - --location=us-central1
      - --config=clouddeploy.yaml

images:
  - 'gcr.io/$PROJECT_ID/docíntel-ai:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/docíntel-ai:latest'

options:
  machineType: 'N1_HIGHCPU_8'

timeout: 1800s
